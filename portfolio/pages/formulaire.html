<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <script src="../js/styles.js" defer></script>
    <title>contact</title>
</head>
<body>
        <!-- CONTACT -->
        <section id="contact">
            <h3 class="section-title">Contactez-moi</h3>

            <button onclick="openGmail()">
                <span class="email-icon">📧</span> Contactez-moi
            </button>

            <button onclick="openLinkedIn()">
                <span class="email-icon">💼</span> LINKEDIN
            </button>

            <p>Email : alexiscrotte19@gmail.com</p>
            <p>Téléphone : 06 41 40 15 49</p>
        </section>


        <!-- FORMULAIRE -->
        <section class="form-section hover-3d">
            <h2 class="section-title">Formulaire</h2>

          

                <!-- IDENTITÉ -->
                <fieldset>
                    <legend>Identité</legend>

                    <div class="form-group">
                        <label for="fname"  required>Prénom</label>
                        <input type="text" id="fname" name="fname" tabindex="1" placeholder="Votre prénom" required>
                    </div>

                    <div class="form-group">
                        <label for="lname"required>Nom</label>
                        <input type="text" id="lname" name="lname" tabindex="2" placeholder="Votre nom" required>
                    </div>

                    <div class="form-group">
                        <label>Sexe</label>
                        <div class="radio-group">
                            <label><input type="radio" name="sexe" value="masculin" tabindex="3"> Masculin</label>
                            <label><input type="radio" name="sexe" value="féminin" tabindex="4"> Féminin</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="birthday">Date de naissance</label>
                        <input type="date" id="birthday" name="birthday" tabindex="5" required placeholder="Votre date de naissance">
                    </div>
                </fieldset>


                <!-- MIEUX VOUS CONNAÎTRE -->
                <fieldset>
                    <legend>Mieux vous connaître</legend>

                    <div class="form-group">
                        <label for="cours">Votre cours préféré</label>
                        <input type="text" id="cours" name="cours" tabindex="6" placeholder="Ex: Mathématiques, Informatique...">
                    </div>

                    <div class="form-group">
                        <label for="menu">Votre département</label>
                        <select id="menu" name="menu" tabindex="7">
                            <option>Drôme</option>
                            <option>Loire</option>
                            <option>Ardèche</option>
                            <option>Autre</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="departement">Numéro de département</label>
                        <input type="text" id="departement" name="departement" tabindex="8" placeholder="Ex: 26 pour la Drôme">
                    </div>

                    <div class="form-group">
                        <label for="deplace">Je viens en cours</label>
                        <select id="deplace" name="deplace" tabindex="9">
                            <option>À pied</option>
                            <option>Jet privé</option>
                            <option>Bus</option>
                            <option>Voiture</option>
                        </select>
                    </div>
                </fieldset>


                <!-- INSCRIPTION -->
                <fieldset>
                    <legend>Inscription à la formation</legend>

                    <div class="form-group">
                        <label for="motivation">Votre motivation</label>
                        <textarea id="motivation" name="motivation" tabindex="10" rows="6" cols="50" placeholder="Décrivez votre motivation..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="loisirs" tabindex="11">Vos loisirs</label>
                        <select id="loisirs" name="loisirs" tabindex="11">
                            <option>Sport</option>
                            <option>Alcool</option>
                            <option>Cinéma</option>
                            <option>Argent</option>
                        </select>
                    </div>
                </fieldset>

                <button type="submit" class="submit-btn">Envoyer</button>

        </section>
</body>
</html>
